    <style>
      /* Highly aggressive CSS to hide any lovable-related elements */
      [id*="lovable"], [class*="lovable"], [id*="gpt-designer"], [class*="gpt-designer"],
      a[href*="lovable.app"], a[href*="lovable.dev"], iframe[src*="lovable"],
      #lovable-badge, #lovable-badge-container, #lovable-badge-cta, #lovable-badge-close,
      .lovable-badge, [data-lovable-badge] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        z-index: -9999 !important;
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>
    <script>
      (function() {
        const remove = () => {
          const ids = ['lovable-badge', 'lovable-badge-container', 'lovable-badge-cta', 'lovable-badge-close', 'gpt-designer-badge'];
          ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.remove();
          });
          const badges = document.querySelectorAll('.lovable-badge, [data-lovable-badge], a[href*="lovable.app"], iframe[src*="lovable"]');
          badges.forEach(b => b.remove());
        };
        setInterval(remove, 100);
        window.addEventListener('load', remove);
      })();
    </script>
  </head>

  <body class="hide-lovable">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      #lovable-badge, #lovable-badge-container, #lovable-badge-cta, #lovable-badge-close, 
      .lovable-badge, [data-lovable-badge], #gpt-designer-badge,
      iframe[src*="lovable"], a[href*="lovable.app"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>

    <script>
      (function() {
        const remove = () => {
          const cleanup = (root) => {
            if (!root) return;
            
            const all = root.querySelectorAll('*');
            all.forEach(el => {
              // SEGURANÇA: Não remover o body ou o root
              if (el.tagName === 'BODY' || el.tagName === 'HTML' || el.id === 'root') return;

              const id = el.id || '';
              const className = typeof el.className === 'string' ? el.className : '';
              
              const isLovable = id.toLowerCase().includes('lovable') || 
                               className.toLowerCase().includes('lovable') ||
                               id.toLowerCase().includes('gpt-designer') ||
                               className.toLowerCase().includes('gpt-designer') ||
                               (el.tagName === 'A' && el.href && (el.href.includes('lovable.app') || el.href.includes('lovable.dev'))) ||
                               (el.tagName === 'IFRAME' && el.src && el.src.includes('lovable'));
              
              if (isLovable) {
                el.remove();
              } else if (el.shadowRoot) {
                cleanup(el.shadowRoot);
              }
            });
          };

          cleanup(document);
        };

        const observer = new MutationObserver(() => remove());
        observer.observe(document.documentElement, { childList: true, subtree: true });
        
        remove();
        setInterval(remove, 1000);
      })();
    </script>
  </body>
