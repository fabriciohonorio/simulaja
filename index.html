    <style>
      /* Targeted CSS to hide only Lovable specific elements */
      #lovable-badge, #lovable-badge-container, #lovable-badge-cta, #lovable-badge-close,
      .lovable-badge, [data-lovable-badge], #gpt-designer-badge,
      a[href*="lovable.app"], a[href*="lovable.dev"], iframe[src*="lovable"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        z-index: -9999 !important;
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>
    <script>
      (function() {
        const remove = () => {
          const ids = ['lovable-badge', 'lovable-badge-container', 'lovable-badge-cta', 'lovable-badge-close', 'gpt-designer-badge'];
          ids.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.remove();
          });
          const badges = document.querySelectorAll('.lovable-badge, [data-lovable-badge], a[href*="lovable.app"], iframe[src*="lovable"]');
          badges.forEach(b => b.remove());
        };
        setInterval(remove, 100);
        window.addEventListener('load', remove);
      })();
    </script>

  <body class="hide-lovable">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/cin-effects.js" defer></script>

    <style>
      #lovable-badge, #lovable-badge-container, #lovable-badge-cta, #lovable-badge-close, 
      .lovable-badge, [data-lovable-badge], #gpt-designer-badge,
      iframe[src*="lovable"], a[href*="lovable.app"] {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
        position: fixed !important;
        top: -9999px !important;
        left: -9999px !important;
        width: 0 !important;
        height: 0 !important;
      }
    </style>

    <script>
      (function() {
        const remove = () => {
          const targets = ['lovable-badge', 'lovable-badge-container', 'lovable-badge-cta', 'lovable-badge-close', 'gpt-designer-badge'];
          const selectors = '.lovable-badge, [data-lovable-badge], a[href*="lovable.app"], a[href*="lovable.dev"], iframe[src*="lovable"]';

          const cleanup = (root) => {
            if (!root) return;
            
            // Remove by targeted ID
            targets.forEach(id => {
              const el = root.getElementById ? root.getElementById(id) : root.querySelector(`#${id}`);
              if (el && el.tagName !== 'BODY' && el.tagName !== 'HTML') el.remove();
            });

            // Remove by targeted selectors
            root.querySelectorAll(selectors).forEach(el => {
              if (el.tagName !== 'BODY' && el.tagName !== 'HTML' && el.id !== 'root') el.remove();
            });

            // Shadow DOM check
            const all = root.querySelectorAll('*');
            all.forEach(el => {
              if (el.shadowRoot) cleanup(el.shadowRoot);
            });
          };

          cleanup(document);
        };

        const observer = new MutationObserver(() => remove());
        observer.observe(document.documentElement, { childList: true, subtree: true });
        
        remove();
        setInterval(remove, 1500);
      })();
    </script>
  </body>
